server:
  port: 8080

spring:
  application:
    name: immigration-ops-backend
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  servlet:
    multipart:
      max-file-size: 25MB
      max-request-size: 25MB

app:
  cors:
    allowed-origins:
      - http://localhost:5173
  storage:
    root-path: data/uploads
  security:
    username: ${APP_SECURITY_USERNAME:admin}
    password: ${APP_SECURITY_PASSWORD:change-me}
  ocr:
    provider: ${APP_OCR_PROVIDER:openai}
    openai:
      api-key: ${OPENAI_API_KEY:}
      model: ${OPENAI_OCR_MODEL:gpt-4o-mini}
      base-url: ${OPENAI_BASE_URL:https://api.openai.com}
      timeout-seconds: ${OPENAI_TIMEOUT_SECONDS:60}
    google-vision:
      credentials-path: ${GOOGLE_VISION_CREDENTIALS_PATH:}
      parent: ${GOOGLE_VISION_PARENT:}
      max-pages: ${GOOGLE_VISION_MAX_PAGES:5}
